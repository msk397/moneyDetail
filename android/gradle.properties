org.gradle.jvmargs=-Xmx4G
android.useAndroidX=true
android.enableJetifier=true

# Route Gradle dependency resolution through local proxy.
systemProp.http.proxyHost=192.168.31.105
systemProp.http.proxyPort=7890
systemProp.https.proxyHost=192.168.31.105
systemProp.https.proxyPort=7890
systemProp.socksProxyHost=192.168.31.105
systemProp.socksProxyPort=7890
systemProp.http.nonProxyHosts=localhost|127.0.0.1

# Ensure modern TLS protocols are enabled for Maven downloads.
systemProp.jdk.tls.client.protocols=TLSv1.2,TLSv1.3
